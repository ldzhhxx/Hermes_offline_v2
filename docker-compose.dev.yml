services:
  hermes-offline-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: hermes-offline:latest
    container_name: hermes-offline-dev
    entrypoint: ["/opt/hermes-offline/scripts/start-dev.sh"]
    ports:
      - "18789:18789"
      - "5000:5000"
    volumes:
      # Source code mounts: edit these files on the host, the dev entrypoint
      # detects changes and restarts Agent/WebUI automatically.
      - ./hermes-agent:/opt/hermes-offline/hermes-agent
      - ./hermes-webui:/opt/hermes-offline/hermes-webui
      - ./scripts:/opt/hermes-offline/scripts

      # Persistent runtime data and workspace.
      - ./data:/home/hermes/.hermes
      - ./workspace:/home/hermes/workspace
    environment:
      HERMES_HOME: /home/hermes/.hermes
      HERMES_WORKSPACE: /home/hermes/workspace
      HERMES_AGENT_HOST: 0.0.0.0
      HERMES_AGENT_PORT: "5000"
      HERMES_WEBUI_HOST: 0.0.0.0
      HERMES_WEBUI_PORT: "18789"
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: "5000"
      API_SERVER_KEY: ${API_SERVER_KEY:-hermes-offline-dev-default-api-key-please-change}
      API_SERVER_CORS_ORIGINS: http://localhost:18789,http://127.0.0.1:18789
      HERMES_WEBUI_AGENT_DIR: /opt/hermes-offline/hermes-agent
      HERMES_WEBUI_PYTHON: /opt/hermes-offline/.venv/bin/python
      HERMES_WEBUI_STATE_DIR: /home/hermes/.hermes/webui
      HERMES_WEBUI_SKIP_ONBOARDING: "1"
      HERMES_WEBUI_DEFAULT_WORKSPACE: /home/hermes/workspace
      HERMES_DEV_WATCH_INTERVAL: "2"
    restart: unless-stopped
